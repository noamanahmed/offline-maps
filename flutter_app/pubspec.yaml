name: offline_maps
description: Offline Map Explorer - PWA
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets_web/map.html
    - assets_web/leaflet/leaflet.js
    - assets_web/leaflet/leaflet.css
    - assets_web/leaflet/tiny-osmpbf.js
    - assets_web/places_index.json

name: CI/CD Release

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'App_Resources/**'
      - 'webpack.config.js'
      - 'nativescript.config.ts'
      - 'package.json'
      - 'VERSION'
      - '.github/workflows/release.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'App_Resources/**'
      - 'webpack.config.js'
      - 'nativescript.config.ts'
      - 'package.json'
      - '.github/workflows/release.yml'

jobs:
  build-android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - android_version: "8.1"
            api_level: "27"
            bit_architecture: "64-bit"
            abi_filters: "arm64-v8a"
          - android_version: "8.1"
            api_level: "27"
            bit_architecture: "32-bit"
            abi_filters: "armeabi-v7a"

          - android_version: "9"
            api_level: "28"
            bit_architecture: "64-bit"
            abi_filters: "arm64-v8a"
          - android_version: "9"
            api_level: "28"
            bit_architecture: "32-bit"
            abi_filters: "armeabi-v7a"

          - android_version: "10"
            api_level: "29"
            bit_architecture: "64-bit"
            abi_filters: "arm64-v8a"
          - android_version: "10"
            api_level: "29"
            bit_architecture: "32-bit"
            abi_filters: "armeabi-v7a"

          - android_version: "11"
            api_level: "30"
            bit_architecture: "64-bit"
            abi_filters: "arm64-v8a"

          - android_version: "12"
            api_level: "31"
            bit_architecture: "64-bit"
            abi_filters: "arm64-v8a"

          - android_version: "13"
            api_level: "33"
            bit_architecture: "64-bit"
            abi_filters: "arm64-v8a"

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 35
          build-tools: 35.0.0
          ndk: 27.0.12077973
          cmake: 3.22.1
          packages: "tools platform-tools emulator platforms;android-27 platforms;android-28 platforms;android-29 platforms;android-30 platforms;android-31 platforms;android-33"

      - name: Verify SDK and Configure Environment
        id: sdk-config
        run: |
          echo "SDK location: $ANDROID_SDK_ROOT"
          ls "$ANDROID_SDK_ROOT/platforms/" | head -5
          ls "$ANDROID_SDK_ROOT/build-tools/" | head -5
          echo "sdk-root=$ANDROID_SDK_ROOT" >> $GITHUB_OUTPUT
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "SDK configured. ANDROID_HOME=$ANDROID_SDK_ROOT"

      - name: Install NativeScript CLI
        run: npm install -g nativescript

      - name: Install dependencies
        run: npm ci

      - name: Get Version
        id: get_version
        run: |
          VERSION_PREFIX=$(cat VERSION | xargs)
          FULL_VERSION="${VERSION_PREFIX}.${{ github.run_number }}"
          echo "version=${FULL_VERSION}" >> $GITHUB_OUTPUT
          echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Decode Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release.keystore
          fi

      - name: Sync Map Data
        run: |
          chmod +x scripts/sync-maps.sh
          ./scripts/sync-maps.sh

      - name: Build Android Release APK
        env:
          ANDROID_HOME: ${{ steps.sdk-config.outputs.sdk-root }}
          ANDROID_SDK_ROOT: ${{ steps.sdk-config.outputs.sdk-root }}
          MIN_SDK_VERSION: ${{ matrix.api_level }}
          TARGET_SDK_VERSION: ${{ matrix.api_level }}
          NDK_ABI_FILTERS: ${{ matrix.abi_filters }}
          API_NAME: "android-${{ matrix.android_version }}-api-${{ matrix.api_level }}-${{ matrix.bit_architecture }}"
          VERSION_NAME: ${{ steps.get_version.outputs.version }}-${{ steps.get_version.outputs.date }}
          BASE_VERSION_CODE: ${{ github.run_number }}
          KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          if [ -f "release.keystore" ]; then
            set +e
            ns build android --release \
              --key-store-path release.keystore \
              --key-store-password "$KEYSTORE_PASSWORD" \
              --key-store-alias "$KEYSTORE_ALIAS" \
              --key-store-alias-password "$KEYSTORE_PASSWORD"
            BUILD_EXIT=$?
            set -e
            if [ $BUILD_EXIT -ne 0 ]; then
              APK_FILE=$(find platforms/android/app/build/outputs/apk/release -name "*.apk" 2>/dev/null | head -n 1)
              if [ -z "$APK_FILE" ]; then
                echo "Build failed and no APK produced."
                exit $BUILD_EXIT
              fi
              echo "ns build exited non-zero but APK exists — continuing."
            fi
          else
            echo "Keystore not found. Generating a temporary keystore for building..."
            keytool -genkeypair -v \
              -keystore temp.keystore \
              -alias tempalias \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass temp-password \
              -keypass temp-password \
              -dname "CN=Unknown, OU=Unknown, O=Unknown, L=Unknown, S=Unknown, C=Unknown"
            
            set +e
            ns build android --release \
              --key-store-path temp.keystore \
              --key-store-password temp-password \
              --key-store-alias tempalias \
              --key-store-alias-password temp-password
            BUILD_EXIT=$?
            set -e
            if [ $BUILD_EXIT -ne 0 ]; then
              APK_FILE=$(find platforms/android/app/build/outputs/apk/release -name "*.apk" 2>/dev/null | head -n 1)
              if [ -z "$APK_FILE" ]; then
                echo "Build failed and no APK produced."
                exit $BUILD_EXIT
              fi
              echo "ns build exited non-zero but APK exists — continuing."
            fi
          fi

      - name: Rename and Prepare APK
        run: |
          mkdir -p output-apk
          APK_FILE=$(find platforms/android/app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -f "$APK_FILE" ]; then
            cp "$APK_FILE" "output-apk/android-${{ matrix.android_version }}-api-${{ matrix.api_level }}-${{ matrix.bit_architecture }}.apk"
          else
            echo "Error: APK file not found!"
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.android_version }}-${{ matrix.api_level }}-${{ matrix.bit_architecture }}
          path: output-apk/android-${{ matrix.android_version }}-api-${{ matrix.api_level }}-${{ matrix.bit_architecture }}.apk

  release:
    needs: build-android
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get Version
        id: get_version
        run: |
          VERSION_PREFIX=$(cat VERSION | xargs)
          FULL_VERSION="${VERSION_PREFIX}.${{ github.run_number }}"
          echo "version=${FULL_VERSION}" >> $GITHUB_OUTPUT
          echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: apks
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}-${{ steps.get_version.outputs.date }}
          name: Release v${{ steps.get_version.outputs.version }}-${{ steps.get_version.outputs.date }}
          files: apks/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: CI/CD Release

on:
  push:
    branches:
      - main
    paths:
      - 'flutter_app/**'
      - 'maps/**'
      - 'scripts/**'
      - 'VERSION'
      - '.github/workflows/release.yml'
  pull_request:
    paths:
      - 'flutter_app/**'
      - 'maps/**'
      - 'scripts/**'
      - '.github/workflows/release.yml'

jobs:
  build-android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - android_version: "8.1"
            api_level: "27"
            bit_architecture: "64-bit"
          - android_version: "8.1"
            api_level: "27"
            bit_architecture: "32-bit"
          - android_version: "9"
            api_level: "28"
            bit_architecture: "64-bit"
          - android_version: "9"
            api_level: "28"
            bit_architecture: "32-bit"
          - android_version: "10"
            api_level: "29"
            bit_architecture: "64-bit"
          - android_version: "10"
            api_level: "29"
            bit_architecture: "32-bit"
          - android_version: "11"
            api_level: "30"
            bit_architecture: "64-bit"
          - android_version: "12"
            api_level: "31"
            bit_architecture: "64-bit"
          - android_version: "13"
            api_level: "33"
            bit_architecture: "64-bit"

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate places_index.json
        run: python3 scripts/generate_places_index.py

      - name: Configure Android SDK version
        working-directory: flutter_app/android
        run: |
          cat > local.properties << EOF
          sdk.dir=$ANDROID_HOME
          flutter.minSdkVersion=${{ matrix.api_level }}
          flutter.targetSdkVersion=${{ matrix.api_level }}
          EOF

      - name: Install Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Get Version
        id: get_version
        run: |
          VER=$(cat VERSION | xargs).${{ github.run_number }}
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "date=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Build Android APK
        working-directory: flutter_app
        run: |
          flutter build apk --release --target-platform android-arm64

      - name: Rename and prepare APK
        run: |
          mkdir -p output-apk
          APK=$(find flutter_app/build/app/outputs/flutter-apk -name "*.apk" | head -1)
          if [ -f "$APK" ]; then
            cp "$APK" "output-apk/android-${{ matrix.android_version }}-api-${{ matrix.api_level }}-${{ matrix.bit_architecture }}.apk"
          else
            echo "Error: APK not found"
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.android_version }}-${{ matrix.api_level }}-${{ matrix.bit_architecture }}
          path: output-apk/

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate places_index.json
        run: python3 scripts/generate_places_index.py


      - name: Install Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build Flutter web
        working-directory: flutter_app
        run: flutter build web

      - name: Copy PWA assets to build output
        run: |
          # leaflet removed - pure Flutter map now
          # places_index.json is bundled by flutter build web
          cp flutter_app/web/service_worker.js flutter_app/build/web/ 2>/dev/null || true
          cp flutter_app/web/manifest.json flutter_app/build/web/ 2>/dev/null || true
          # maps bundled by flutter build web
          rsync -a flutter_app/assets_web/maps/ flutter_app/build/web/maps/ 2>/dev/null || true

      - name: Get version
        id: version
        run: |
          VER=$(cat VERSION | xargs).${{ github.run_number }}
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Upload PWA artifact
        uses: actions/upload-artifact@v4
        with:
          name: pwa-build
          path: flutter_app/build/web/

  release:
    needs: [build-android, build-web]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get Version
        id: get_version
        run: |
          VER=$(cat VERSION | xargs).${{ github.run_number }}
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "date=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Download all APK artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: apk-*
          path: apks
          merge-multiple: true

      - name: Download PWA artifact
        uses: actions/download-artifact@v4
        with:
          name: pwa-build
          path: pwa

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}-${{ steps.get_version.outputs.date }}
          name: Release v${{ steps.get_version.outputs.version }}-${{ steps.get_version.outputs.date }}
          files: |
            apks/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy PWA to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: pwa
          publish_branch: gh-pages

name: CI/CD PWA

on:
  push:
    branches:
      - main
    paths:
      - 'flutter_app/**'
      - 'maps/**'
      - 'scripts/**'
      - 'VERSION'
      - '.github/workflows/release.yml'
  pull_request:
    paths:
      - 'flutter_app/**'
      - 'maps/**'
      - 'scripts/**'
      - '.github/workflows/release.yml'

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate places_index.json
        working-directory: flutter_app/web
        run: |
          python3 ../../scripts/generate_places_index.py

      - name: Sync map data
        run: |
          chmod +x scripts/sync-maps.sh
          ./scripts/sync-maps.sh

      - name: Install Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build Flutter web
        working-directory: flutter_app
        run: flutter build web --web-renderer html

      - name: Copy PWA assets to build output
        run: |
          cp flutter_app/web/map.html flutter_app/build/web/
          cp -r flutter_app/web/leaflet flutter_app/build/web/
          cp flutter_app/web/service_worker.js flutter_app/build/web/
          cp flutter_app/web/manifest.json flutter_app/build/web/
          cp flutter_app/web/places_index.json flutter_app/build/web/
          mkdir -p flutter_app/build/web/maps
          cp -r maps/countries flutter_app/build/web/maps/

      - name: Verify offline (no external requests)
        run: |
          ! grep -rP 'https?://(?!www\.w3\.org)' flutter_app/build/web/ --include="*.html" --include="*.js" --include="*.dart"

      - name: Get version
        id: version
        run: |
          VER=$(cat VERSION | xargs).${{ github.run_number }}
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "date=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Upload PWA artifact
        uses: actions/upload-artifact@v4
        with:
          name: pwa-build
          path: flutter_app/build/web/

  deploy:
    needs: build-web
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pwa-build
          path: build-output

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build-output
          publish_branch: gh-pages

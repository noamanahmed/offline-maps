<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Offline Map</title>
    <link rel="stylesheet" href="leaflet/leaflet.css" />
    <style>
        html, body, #map { height: 100%; margin: 0; padding: 0; background-color: #f4f3f0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .dark-theme { background-color: #1a1a1a !important; }
        .dark-theme .leaflet-container { background-color: #1a1a1a !important; }
        .dark-theme .leaflet-tile-pane { filter: invert(1) hue-rotate(180deg) brightness(0.85) contrast(1.2); }
        .leaflet-control-attribution { display: none !important; }
        .leaflet-bar { border: none !important; box-shadow: 0 2px 6px rgba(0,0,0,0.15) !important; border-radius: 8px !important; overflow: hidden; }
        .leaflet-bar a { border-bottom: 1px solid #f0f0f0 !important; }
        .leaflet-bar a:last-child { border-bottom: none !important; }
        @keyframes gps-pulse { 0% { transform: scale(0.8); opacity: 0.5; } 70% { transform: scale(2.2); opacity: 0; } 100% { transform: scale(0.8); opacity: 0; } }
        .poi-icon { display: flex; align-items: center; justify-content: center; width: 30px !important; height: 30px !important; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.25); border: 2px solid #ffffff; transition: all 0.2s ease; }
        .poi-icon:hover { transform: scale(1.15); }
        .poi-icon svg { width: 16px; height: 16px; fill: #ffffff; }
    </style>
    <script src="leaflet/leaflet.js"></script>
    <script src="leaflet/tiny-osmpbf.js"></script>
    <script src="map-bundle.js"></script>
</head>
<body class="light-theme">
    <div id="map"></div>
    <script>
        window.__mapBundleReady();
    </script>
</body>
</html>
